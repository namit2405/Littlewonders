<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – Little Wonders</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-purple-50 flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-xl p-10 w-full max-w-md">
    <h1 class="text-2xl font-bold text-center text-purple-700 mb-2">Little Wonders</h1>
    <p class="text-center text-gray-500 mb-8">Admin Portal</p>
    <form id="login-form" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" id="email" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="password" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-400" />
      </div>
      <div id="error-msg" class="hidden text-red-500 text-sm text-center"></div>
      <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-2 rounded-lg transition">Login</button>
    </form>
  </div>
  <script>
    const API = '/api';
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('error-msg');
      errEl.classList.add('hidden');
      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) { errEl.textContent = data.error; errEl.classList.remove('hidden'); return; }
        localStorage.setItem('lw_token', data.token);
        window.location.href = '/admin/index.html';
      } catch {
        errEl.textContent = 'Connection error. Is the server running?';
        errEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
